name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 检出你的代码
      uses: actions/checkout@v4

    - name: 准备 Theos 环境
      uses: actions/checkout@v4
      with:
        repository: theos/theos
        path: theos
        submodules: true

    - name: 下载 iOS SDK
      run: |
        rm -rf theos/sdks 
        git clone https://github.com/theos/sdks.git theos/sdks

    # -------- 这里是新增的步骤 --------
    - name: 安装依赖 (ldid)
      run: |
        brew install ldid
    # --------------------------------

    - name: 编译 Tweak
      env:
        THEOS: ${{ github.workspace }}/theos
      run: |
        make clean
        make FINALPACKAGE=1

    - name: 提取并上传 dylib 文件
      uses: actions/upload-artifact@v4
      with:
        name: HongGuoPatch-Dylib
        path: .theos/obj/**/*.dylib






        
